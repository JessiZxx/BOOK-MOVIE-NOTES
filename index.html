<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私人书影记录</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- ==================== 认证视图 ==================== -->
  <div id="auth-view" class="view active">
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">私人书影记录</h1>
        <p class="auth-subtitle">记录你的阅读与观影时光</p>

        <!-- 登录表单 -->
        <form id="login-form" class="auth-form">
          <h2 class="form-title">登录</h2>
          <div class="form-group">
            <label for="login-email">邮箱</label>
            <input type="email" id="login-email" placeholder="请输入邮箱" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">密码</label>
            <input type="password" id="login-password" placeholder="请输入密码" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full">登录</button>
          <p class="form-switch">
            还没有账号？<button type="button" class="link-btn" id="switch-to-register">立即注册</button>
          </p>
        </form>

        <!-- 注册表单 -->
        <form id="register-form" class="auth-form" style="display:none;">
          <h2 class="form-title">注册</h2>
          <div class="form-group">
            <label for="register-email">邮箱</label>
            <input type="email" id="register-email" placeholder="请输入邮箱" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="register-password">密码</label>
            <input type="password" id="register-password" placeholder="请输入密码（至少6位）" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full">注册</button>
          <p class="form-switch">
            已有账号？<button type="button" class="link-btn" id="switch-to-login">去登录</button>
          </p>
        </form>

        <div id="auth-message" class="auth-message"></div>
      </div>
    </div>
  </div>

  <!-- ==================== 主应用视图 ==================== -->
  <div id="app-view" class="view">

    <!-- 顶部导航 -->
    <header class="app-header">
      <div class="header-left">
        <button class="btn btn-icon" id="btn-back" title="返回">←</button>
        <h1 class="header-title" id="header-title">我的记录</h1>
      </div>
      <div class="header-right">
        <span class="user-email" id="user-email"></span>
        <button class="btn btn-text" id="btn-logout">退出</button>
      </div>
    </header>

    <!-- 内容区域 -->
    <main class="app-main">

      <!-- 仪表盘视图：Books / Movies 两大板块 -->
      <div id="dashboard-view" class="subview active">
        <div class="dashboard-grid">
          <div class="dashboard-card" data-type="book">
            <div class="card-icon">📚</div>
            <h2 class="card-title">Books</h2>
            <p class="card-desc">书籍记录</p>
          </div>
          <div class="dashboard-card" data-type="movie">
            <div class="card-icon">🎬</div>
            <h2 class="card-title">Movies</h2>
            <p class="card-desc">电影记录</p>
          </div>
        </div>
      </div>

      <!-- 文件夹列表视图 -->
      <div id="folders-view" class="subview">
        <div class="section-header">
          <h2 id="folders-title">文件夹</h2>
          <button class="btn btn-primary" id="btn-add-folder">+ 新建文件夹</button>
        </div>
        <div id="folders-list" class="cards-grid"></div>
        <div id="folders-empty" class="empty-state" style="display:none;">
          <p>暂无文件夹，点击上方按钮创建</p>
        </div>
      </div>

      <!-- 条目列表视图 -->
      <div id="entries-view" class="subview">
        <div class="section-header">
          <h2 id="entries-title">条目</h2>
          <button class="btn btn-primary" id="btn-add-entry">+ 新建条目</button>
        </div>
        <div id="entries-list" class="cards-grid"></div>
        <div id="entries-empty" class="empty-state" style="display:none;">
          <p>暂无条目，点击上方按钮创建</p>
        </div>
      </div>

      <!-- 条目详情/编辑视图 -->
      <div id="entry-detail-view" class="subview">
        <form id="entry-form" class="entry-form">
          <div class="form-group">
            <label for="entry-title">标题</label>
            <input type="text" id="entry-title" placeholder="书名或电影名" required>
          </div>

          <div class="form-group">
            <label>评分</label>
            <div class="star-rating" id="star-rating">
              <span data-star="1">☆</span>
              <span data-star="2">☆</span>
              <span data-star="3">☆</span>
              <span data-star="4">☆</span>
              <span data-star="5">☆</span>
            </div>
            <input type="hidden" id="entry-rating" value="0">
          </div>

          <div class="form-group">
            <label for="entry-notes">笔记</label>
            <textarea id="entry-notes" rows="6" placeholder="读后感 / 影评……"></textarea>
          </div>

          <div class="form-group">
            <label>图片</label>
            <div class="image-upload-area">
              <div id="image-preview" class="image-preview" style="display:none;">
                <img id="image-preview-img" src="" alt="预览">
                <button type="button" class="btn btn-text btn-remove-img" id="btn-remove-img">移除</button>
              </div>
              <div id="image-upload-btn" class="upload-placeholder">
                <input type="file" id="entry-image-input" accept="image/*">
                <span>点击上传图片</span>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-danger" id="btn-delete-entry" style="display:none;">删除条目</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>

    </main>
  </div>

  <!-- ==================== 模态框：新建/编辑文件夹 ==================== -->
  <div id="folder-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-card">
      <h3 id="folder-modal-title">新建文件夹</h3>
      <form id="folder-form">
        <div class="form-group">
          <label for="folder-name">文件夹名称</label>
          <input type="text" id="folder-name" placeholder="例如：散文书单" required>
        </div>
        <input type="hidden" id="folder-id" value="">
        <div class="form-actions">
          <button type="button" class="btn btn-text" id="btn-cancel-folder">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ==================== 加载遮罩 ==================== -->
  <div id="loading-overlay" class="loading-overlay" style="display:none;">
    <div class="spinner"></div>
  </div>

  <!-- ==================== JavaScript 模块 ==================== -->
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
